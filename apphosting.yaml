# Firebase App Hosting — uses your existing Firebase project APIs
# Project: money-command-3ee1b
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  concurrency: 80
  minInstances: 0
  maxInstances: 10

env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # Use Firestore (your existing Firebase database)
  - variable: USE_FIRESTORE
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: money-command-3ee1b
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: money-command-3ee1b
    availability:
      - BUILD
      - RUNTIME

  # Plaid (optional) — bank linking only works after secrets are created.
  # Deploy fails if you reference secrets that don't exist yet, so these are
  # commented out by default. When ready, uncomment and run:
  #   firebase use money-command-3ee1b
  #   firebase apphosting:secrets:set PLAID_CLIENT_ID
  #   firebase apphosting:secrets:set PLAID_SECRET
  #   firebase apphosting:secrets:grantaccess PLAID_CLIENT_ID PLAID_SECRET --backend money-command
  #
  # - variable: PLAID_CLIENT_ID
  #   secret: PLAID_CLIENT_ID
  #   availability:
  #     - RUNTIME
  #
  # - variable: PLAID_SECRET
  #   secret: PLAID_SECRET
  #   availability:
  #     - RUNTIME

  - variable: PLAID_ENV
    value: sandbox
    availability:
      - RUNTIME
