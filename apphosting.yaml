# Firebase App Hosting — uses your existing Firebase project APIs
# Project: money-command-3ee1b
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  concurrency: 80
  minInstances: 0
  maxInstances: 10

env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # Use Firestore (your existing Firebase database)
  - variable: USE_FIRESTORE
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: money-command-3ee1b
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: money-command-3ee1b
    availability:
      - BUILD
      - RUNTIME

  # Plaid: Settings → Bank Linking in the app (Firestore). No Secret Manager needed.

  - variable: PLAID_ENV
    value: sandbox
    availability:
      - RUNTIME
