# Firebase App Hosting — ForgePS Personal Finance
# Project: personal-finance-ed108
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  concurrency: 80
  minInstances: 1
  maxInstances: 10

env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # Use Firestore (your existing Firebase database)
  - variable: USE_FIRESTORE
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: personal-finance-ed108
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: personal-finance-ed108
    availability:
      - BUILD
      - RUNTIME

  # Prisma generate at build time only; production runtime uses Firestore.
  - variable: DATABASE_URL
    value: file:./build.db
    availability:
      - BUILD

  # Plaid: see apphosting.plaid.example.yaml — do not add secrets here until
  # scripts/setup-plaid-secrets.sh has been run successfully.
