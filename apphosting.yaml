# Firebase App Hosting — uses your existing Firebase project APIs
# Project: money-command-3ee1b
# Docs: https://firebase.google.com/docs/app-hosting/configure

runConfig:
  cpu: 1
  memoryMiB: 1024
  concurrency: 80
  minInstances: 1
  maxInstances: 10

env:
  - variable: NODE_ENV
    value: production
    availability:
      - BUILD
      - RUNTIME

  # Use Firestore (your existing Firebase database)
  - variable: USE_FIRESTORE
    value: "true"
    availability:
      - BUILD
      - RUNTIME

  - variable: FIREBASE_PROJECT_ID
    value: money-command-3ee1b
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: money-command-3ee1b
    availability:
      - BUILD
      - RUNTIME

  # Plaid credentials from Secret Manager (pinned to version 1)
  - variable: PLAID_CLIENT_ID
    secret: PLAID_CLIENT_ID@1
    availability:
      - RUNTIME

  - variable: PLAID_SECRET
    secret: PLAID_SECRET@1
    availability:
      - RUNTIME

  - variable: PLAID_ENV
    value: production
    availability:
      - RUNTIME

  # Protects POST /api/cron/sync-accounts (daily bank sync via Cloud Scheduler)
  - variable: CRON_SECRET
    secret: CRON_SECRET@1
    availability:
      - RUNTIME
